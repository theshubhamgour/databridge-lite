apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-initdb
  namespace: databridge-namespace
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS appdb;
    USE appdb;
    
    CREATE TABLE IF NOT EXISTS messages (
        id INT AUTO_INCREMENT PRIMARY KEY,
        content TEXT NOT NULL
    );
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-deployment
  namespace: databridge-namespace
  labels:
    app: mysql
spec:
  replicas: 1 # Databases typically run as 1 replica unless clustered
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: "root"
        - name: MYSQL_DATABASE
          value: "appdb"
        ports:
        - containerPort: 3306
        volumeMounts:
        - name: initdb
          mountPath: /docker-entrypoint-initdb.d/init.sql
          subPath: init.sql
      volumes:
      - name: initdb
        configMap:
          name: mysql-initdb
---
# The Service name must be 'mysql' so the backend can resolve it via 'DB_HOST: mysql'
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: databridge-namespace
spec:
  type: ClusterIP
  selector:
    app: mysql
  ports:
  - port: 3306
    targetPort: 3306
